<div class="borrow-container">

  <h2>Borrow Equipment</h2>

  <form id="borrowForm">

    <div class="form-group">
      <label>Student Name</label>
      <input type="text" id="studentName" placeholder="Enter student name" required>
    </div>

    <div class="form-group">
      <label>Admission Number</label>
      <input type="text" id="admissionNo" placeholder="Enter admission number" required>
    </div>

    <div class="form-group">
      <label>Equipment Name</label>
      <input type="text" id="equipmentName" placeholder="Enter equipment name" required>
    </div>

    <div class="form-group">
      <label>Serial Number</label>
      <input type="text" id="serialNo" placeholder="Enter serial number" required>
    </div>

    <div class="form-group">
      <label>Course</label>
      <input type="text" id="course" placeholder="Enter course" required>
    </div>

    <div class="form-group">
      <label>Borrow Date</label>
      <input type="date" id="borrowDate" required>
    </div>

    <button type="submit" id="borrowBtn">Borrow Equipment</button>

  </form>

</div>
