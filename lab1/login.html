<body>


<main class="auth-container">

    <div class="auth-card">
 <div class="logo">
        <img src="images2/kelly.png" alt="logo" >

 <form id="loginForm">

<p class="signup-text">
    Don't have an account?

</p>
        </form>

           </div>

    </div>

</main>
